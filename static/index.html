<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Smart Parking</title>
    <link rel="stylesheet" href="/static/style1.css?v=2">
</head>

<body>
    <div class="night"></div>
    <div class="app-wrap">
        <header class="app-header">
            <div style="flex:1">
                <h1>Smart Parking</h1>
                <p class="sub">Live status of parking spots — updates in real time</p>
            </div>
            <div class="theme-controls">
                <button id="theme-toggle" class="ghost" aria-pressed="false"
                    title="Toggle light / dark theme">🌙</button>
            </div>
        </header>

        <main>
            <section id="spots" class="spots-grid" aria-live="polite"></section>
        </main>
    </div>

    <script src="/static/app.js?v=2"></script>
</body>

</html>
